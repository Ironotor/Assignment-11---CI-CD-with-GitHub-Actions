name: Automated Test
on: [push]
jobs:
  automated_test_1:
    name: Automated Test 1 - 10 numbers
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.10
        uses: actions/setup-python@v3
        with:
          python-version: "3.10"
      - name: Produce actual output
        run: python3 find_lowest_number.py test_data/test1_input.txt test_data/test1_actual1.txt
      - name: Compare expected output to actual
        run: diff test_data/test1_expected.txt test_data/test1_actual1.txt
  automated_test_2:
    name: Automated Test 2 - no numbers
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.10
        uses: actions/setup-python@v3
        with:
          python-version: "3.10"
      - name: Produce actual output
        run: python3 find_lowest_number.py test_data/test2_input.txt test_data/test2_actual1.txt
      - name: Compare expected output to actual
        run: diff test_data/test2_expected.txt test_data/test2_actual1.txt
  automated_test_3:
    name: Automated Test 3 - 1 number
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.10
        uses: actions/setup-python@v3
        with:
          python-version: "3.10"
      - name: Produce actual output
        run: python3 find_lowest_number.py test_data/test3_input.txt test_data/test3_actual1.txt
      - name: Compare expected output to actual
        run: diff test_data/test3_expected.txt test_data/test3_actual1.txt
        
