name: Automated Test
on: [push]
jobs:
  automated_test:
    name: Automated Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.10
        uses: actions/setup-python@v3
        with:
          python-version: "3.10"
      - name: Produce actual output
        run: python find_lowest_number.py > test1_input.txt test1_actual1.txt
      - name: Compare expected output to actual
        run: diff test1_expected.txt test1_actual1.txt